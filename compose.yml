services:
  api:
    build:
      context: .
      target: api
    container_name: driftshield_api
    command: ["sh", "-c", "python scripts/bootstrap_demo.py && uvicorn fraud_service.api.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./config_ieee.yaml:/app/config_ieee.yaml:ro
    environment:
      - PYTHONPATH=/app/src
      - PROMETHEUS_URL=http://prometheus:9090
      - SECONDARY_CONFIG_PATHS=config_ieee.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import json,sys,urllib.request; d=json.loads(urllib.request.urlopen('http://localhost:8000/ready').read()); sys.exit(0 if d.get('ready') else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  watcher:
    build:
      context: .
      target: api
    container_name: driftshield_watcher
    command: ["python", "scripts/watcher.py", "--config", "config.yaml"]
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  watcher_ieee:
    build:
      context: .
      target: api
    container_name: driftshield_watcher_ieee
    command: ["python", "scripts/watcher.py", "--config", "config_ieee.yaml"]
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./config_ieee.yaml:/app/config_ieee.yaml:ro
    environment:
      - PYTHONPATH=/app/src
      - WATCHER_CONFIG_PATH=config_ieee.yaml
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ieee_traffic:
    build:
      context: .
      target: api
    container_name: driftshield_ieee_traffic
    command:
      [
        "sh",
        "-c",
        "if [ ! -f data/processed/ieee_adapted.csv ]; then python scripts/ieee_adapter.py prepare --sample ${IEEE_SAMPLE:-20000}; fi && python scripts/traffic_loop.py --url http://api:8000 --csv data/processed/ieee_adapted.csv --sleep ${IEEE_TRAFFIC_SLEEP:-0.2}",
      ]
    volumes:
      - ./data:/app/data
      - ./ieee-fraud-detection:/app/ieee-fraud-detection:ro
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONPATH=/app/src
      - IEEE_SAMPLE=20000
      - IEEE_TRAFFIC_SLEEP=0.2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ieee_native_traffic:
    build:
      context: .
      target: api
    container_name: driftshield_ieee_native_traffic
    command:
      [
        "sh",
        "-c",
        "if [ ! -f data/ieee_processed/test.csv ]; then python scripts/setup.py --config config_ieee.yaml; fi && python scripts/traffic_loop.py --url http://api:8000 --schema-version 2 --csv data/ieee_processed/test.csv --sleep ${IEEE_NATIVE_TRAFFIC_SLEEP:-0.2}",
      ]
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./ieee-fraud-detection:/app/ieee-fraud-detection:ro
      - ./config_ieee.yaml:/app/config_ieee.yaml:ro
    environment:
      - PYTHONPATH=/app/src
      - IEEE_NATIVE_TRAFFIC_SLEEP=0.2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    container_name: driftshield_frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: driftshield_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: driftshield_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=none
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana_data:
